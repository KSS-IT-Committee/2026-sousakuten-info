services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: info
      POSTGRES_PASSWORD: info
      POSTGRES_DB: info
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U info -d info"]
      interval: 2s
      timeout: 2s
      retries: 30

  app:
    image: ghcr.io/${IMAGE_SLUG:?IMAGE_SLUG must be set}/preview:${TAG:-latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://info:info@db:5432/info
    ports:
      - "3000:3000"
