name: Build Check

permissions:
  contents: read

on:
  # Trigger on pull requests to main branch
  pull_request:
    branches: ["main"]

  # Trigger on pushes to any branch except main (main is handled by deployment)
  push:
    branches-ignore: ["main"]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build and Type Check
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # scripts/build-changelog.mjs (run via prebuild) resolves add-dates
          # from `git log --follow`; shallow clones would miss older entries.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{js,jsx,ts,tsx}', 'next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Generate next-env.d.ts
        run: npx next typegen || true

      - name: Generate changelog artifact
        # Materialise lib/changelog.generated.json so tsc can resolve the
        # static import in app/changelog/page.tsx. The prebuild hook re-runs
        # this during `npm run build` below; that's fine and idempotent.
        run: npm run changelog

      - name: Run TypeScript compiler check
        run: npx tsc --noEmit

      - name: Build project
        run: npm run build

      - name: Check for build errors
        if: failure()
        run: |
          echo "❌ Build failed! Please fix the errors before merging."
          exit 1

      - name: Build successful
        if: success()
        run: echo "✅ Build completed successfully!"

  lint:
    name: Lint Check
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Cache node_modules
        id: cache-modules-lint
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-modules-lint.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Check ESLint results
        if: failure()
        run: |
          echo "⚠️ Linting issues found. Please review and fix."

  # Summary job to require all checks to pass
  checks-summary:
    name: All Checks Passed
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build, lint]
    if: always()

    steps:
      - name: Check if all jobs succeeded
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build check failed"
            exit 1
          fi

          if [[ "${{ needs.lint.result }}" != "success" && "${{ needs.lint.result }}" != "skipped" ]]; then
            echo "⚠️ Lint check has warnings"
          fi

          echo "✅ All required checks passed!"
